name: Release

on:
  push:
    tags: ["v*", "[0-9]+.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build React frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync --locked --all-groups

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller lerolero.spec --noconfirm

      - name: Prepare distribution
        shell: pwsh
        run: |
          $distPath = "dist/LeroLero"
          New-Item -ItemType Directory -Force -Path "$distPath/history" | Out-Null
          New-Item -ItemType Directory -Force -Path "$distPath/models" | Out-Null

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc "/DMyAppVersion=${{ env.VERSION }}" installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/LeroLero-*-setup.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build React frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync --locked --all-groups

      - name: Build macOS app with PyInstaller
        run: |
          uv run pyinstaller \
            --noconfirm --onedir --windowed \
            --name "LeroLero" \
            --collect-all "lerolero" \
            --collect-all "webview" \
            --collect-all "onnxruntime" \
            --collect-all "onnx_asr" \
            --collect-all "huggingface_hub" \
            --hidden-import "pynput.keyboard._darwin" \
            --hidden-import "pynput.mouse._darwin" \
            --paths "src" \
            --add-data "web/dist:lerolero/web_dist" \
            --add-data "src/lerolero/assets/icon.png:lerolero/assets" \
            --icon "src/lerolero/assets/icon.png" \
            "src/lerolero/__main__.py"

      - name: Create DMG
        run: |
          hdiutil create -volname "LeroLero" -srcfolder "dist/LeroLero.app" \
            -ov -format UDZO "dist/LeroLero-${VERSION}-macos.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/LeroLero-*-macos.dmg

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git tag "${{ env.VERSION }}" || true
          git push origin "${{ env.VERSION }}" || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "LeroLero ${{ env.VERSION }}"
          files: |
            artifacts/windows-installer/*
            artifacts/macos-dmg/*
          generate_release_notes: true
          draft: false
          prerelease: false
