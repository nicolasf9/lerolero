name: Release

on:
  push:
    tags: ["v*", "[0-9]+.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync --locked
          uv pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller lerolero.spec --noconfirm

      - name: Prepare distribution
        shell: pwsh
        run: |
          $distPath = "dist/LeroLero"
          New-Item -ItemType Directory -Force -Path "$distPath/history" | Out-Null
          New-Item -ItemType Directory -Force -Path "$distPath/models" | Out-Null

      - name: Create tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git tag "${{ env.VERSION }}" || true
          git push origin "${{ env.VERSION }}" || true

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc "/DMyAppVersion=${{ env.VERSION }}" installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "LeroLero ${{ env.VERSION }}"
          files: dist/LeroLero-*-setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
