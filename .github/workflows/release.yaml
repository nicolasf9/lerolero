name: Release EXE

on:
  push:
    tags: ["v*", "[0-9]+.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.4.0)"
        required: true

permissions:
  contents: write

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build React frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync --locked
          uv pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller lerolero.spec --noconfirm

      - name: Prepare distribution
        shell: pwsh
        run: |
          $distPath = "dist/LeroLero"

          # Default config
          @{
            hotkey = "<f9>"
            model = "openai/whisper-small"
            language = $null
            device = "auto"
            compute_type = "auto"
            debug = $false
            typing_wpm = 40
            refocus_window = $true
            auto_stop = $false
            auto_paste = $true
            auto_stop_delay = 1.5
            save_history = $true
            run_at_startup = $false
            recording_mode = "hold"
            show_overlay = $true
            live_typing = $false
            theme = "dark"
          } | ConvertTo-Json | Out-File -FilePath "$distPath/config.json" -Encoding utf8

          New-Item -ItemType Directory -Force -Path "$distPath/history" | Out-Null
          New-Item -ItemType Directory -Force -Path "$distPath/models" | Out-Null

      - name: Create tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git tag "${{ env.VERSION }}" || true
          git push origin "${{ env.VERSION }}" || true

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/LeroLero" -DestinationPath "LeroLero-${{ env.VERSION }}-win64.zip"

      - name: Build Inno Setup installer
        run: |
          choco install innosetup -y --no-progress
          iscc installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $src = "dist/LeroLero-${{ env.VERSION }}-setup.exe"
          if (Test-Path $src) {
            Write-Host "Installer ready: $src"
          } else {
            Write-Host "Installer not found at expected path, listing dist/"
            Get-ChildItem dist/ -Filter *.exe
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "LeroLero ${{ env.VERSION }}"
          files: |
            LeroLero-*.zip
            dist/LeroLero-*-setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
